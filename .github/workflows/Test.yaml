name: Test Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'dev-*'
      - dev



  pull_request:
    types:
      - opened
      - edited 
    branches:
       - main
       - 'dev-*'
       - dev



jobs:

  lint:

   runs-on: ubuntu-latest

   steps:
      - name: Checkout
        uses: actions/checkout@v5
     
      - name: Cache
        uses: actions/cache@v5.0.5
        with:
          path: ~/.npm
          key: dep-node-module- ${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: lintng
        run: npm run lint

  Test:
    needs: lint

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache
        uses: actions/cache@v5.0.5
        with:
          path: ~/.npm
          key: dep-node-module- ${{ hashFiles('**/package-lock.json') }}


      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm test
        id: myTests

      - name: Upload a Build Artifact
        if: failure() && steps.run-tests.outcome == 'failure'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: test-reports
          path: test.json


  BuiLd:
    needs: Test

    runs-on: ubuntu-latest
    outputs:
      script-file: ${{steps.publish.outputs.file-name}}
    steps:
      - name: Checkout
        uses: actions/checkout@v5


      - name: Cache
        uses: actions/cache@v5.0.5
        with:
          path: ~/.npm
          key: dep-node-module- ${{ hashFiles('**/package-lock.json') }}


      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm run build

      - name: Store output var
        id: publish
        run: find dist/assets/*.js -type f -execdir echo "file-name={}" >> "$GITHUB_OUTPUT" ';'
     
   
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dist-files
          path: dist

     

  deploy:
    needs: [lint, Test, BuiLd]
    runs-on: ubuntu-latest
    

    steps:
      - name: Checkout
        uses: actions/checkout@v5


      - name: Cache
        uses: actions/cache@v5.0.5
        with:
          path: ~/.npm
          key: dep-node-module- ${{ hashFiles('**/package-lock.json') }}


      - name: Install dependencies
        run: npm ci

      - name: Build Project
        run: npm run build
     
      - name: Print Variable
        run : echo "${{needs.BuiLd.outputs.script-file}}"
        
      - name: Download a Build Artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: dist-files

      - name: Deploying
        run: echo "deploying..."