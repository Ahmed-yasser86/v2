name: Test Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'dev-*'
      - dev
    paths-ignore:
      - '.github/workflows/*'


  pull_request:
    types:
      - opened
      - edited 
    branches:
       - main
       - 'dev-*'
       - dev



jobs:

  lint:

   runs-on: ubuntu-latest

   steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: npm ci

      - name: lintng
        run: npm run lint

  Test:
    needs: lint

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

  BuiLd:
    needs: Test

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm run build

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dist-files
          path: dist

     

  deploy:
    needs: [lint, Test, BuiLd]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

        
      - name: Download a Build Artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: dist-files

      - name: Deploying
        run: echo "deploying..."